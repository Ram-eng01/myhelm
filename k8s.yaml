1. What is the diffrence between ReplicaSet & Deployment?
A: The main responsibility of ReplicaSet is to maintain the desired number of PODs in the cluster. It doesn't provide the rolling updates, rollback, image updates, etc. 

Deployment create replicaset as part of execution. Deployment provides the rolling updates, rollback, etc. Deployment is more advanced than ReplicaSet.


2. What is a sidecar in Kubernetes?
A: Sidecar is a design pattern in K8S where we run an additional container in the same POD to provide additional functionality to the main container. For example, 
  we can run a logging container in the same POD to collect the logs of the main container.

We can additional containers in the same POD along with the main container. This is called as Sidecar pattern and we have 3 patterns in K8S.
- Init Container:
  - They always starts before the main container and completes the task and then main 
    container starts.
  - We can have multiple init containers in the same POD.
  - All the init containers should complete successfully before the main container    
    starts.
  - Init Container executes in a sequential order. For example the second init container 
    will start only after the first init container completes.
  - Init Container is used to perform the initialization tasks like downloading the 
    configuration files, checking DB connectivity, checking the storage, etc.

- Adapter Container:
  - Adapter container runs along with the main container and provides the additional 
    functionality to the main container.
  - Example: 
    - Istio-proxy container runs along with the main container to provide the 
      service mesh functionality to the main container.
    - Logging container runs along with the main container to collect the logs of the 
      application running in the main container.
    - Backup container runs along with the main container to take the backup of the 
      application/DB running in the main container.

- Ambassador Container => Mostly used as Proxy container.

3. How do you check the logs of the POD?
A: kubectl logs POD_NAME

4. How to check logs of a POD which contain 4 containers named as main, sidecar1, sidecar2, sidecar3? How can I check the logs of sidecar2 container?
A: kubectl logs POD_NAME -c sidecar2
    To get latest logs use -f option.

5. How to check the logs of the POD which is already deleted (or) How to check logs of the POD which is restarted?
A: kubectl logs POD_NAME --previous

6. How can I copy a file to a running container/Pod?
A: kubectl cp /path/to/file POD_NAME:/path/to/file

7. What is the difference between kubectl create and kubectl apply?
A: kubectl create => It creates the resource in the cluster. If the resource already 
   exists, it will throw an error. Its imperative way of creating the resource.
   kubectl create deployment app1 --image sreeharshav/fastapi:laest --replicas 3

   kubectl apply => It creates the resource in the cluster using declarative YAML/JSON file. If the resource already exists, it will update the resource with the new configuration. Its declarative way of creating the resource.
   kubectl create -f file.yml

8. How to go inside the POD and execute the commands?
A: kubectl exec -it POD_NAME -- /bin/bash
   kubectl exec -it POD_NAME -c CONTAINER_NAME -- /bin/bash


9. Image there are two containers in a POD. How they communicate with each other?
A: Containers in the same POD share the network namespace. So, they can communicate with 
   each other using localhost.

10. I have two containers in a POD. What will be the IP address of the containers?
A: Both the containers in the same POD will have the same IP address. POD is the smallest unit in K8S and it shares the network namespace. So, both the containers in 
   the same POD will have the same IP address.

11. What is the difference between Deployment, DaemonSet, StatefulSet?
A: Deployment => It is used to deploy the stateless applications in the cluster. It is used to manage the PODs which are stateless in nature like frontend and backend.
It provides the rolling updates, rollback, scaling, etc. It is used to manage the stateless applications in the cluster. Everytime pods are recreated the name of the pod will be changed. This is suitable for stateless applications and scaling is done by increasing the number of replicas as per the requirement.
Eg: Frontend, Backend, etc.

DaemonSet => It will make sure run one POD on each node for sure. Image if you have 3 nodes, then 3 PODs will be created. If you add one more node, then one more POD 
will be created automatically. This is suitable for monitoring agents, logging agents, etc. which should run on each node in the cluster.

StatefulSet => It is used to deploy the stateful applications in the cluster. It is used to manage the PODs which are stateful in nature like DB, Kafka, etc.
- StatefulSet provides the stable network identity to the PODs. Means if the POD is recreated, it will have the same POD name.
Eg: mongo0, mongo1, mongo2, etc.
- PODs starts in a sequential order. Means mongo1 will start only after mongo0 starts.
- Even the POD is rebooted it will be assigned same volume.
- SS needs Headless Service to provide the DNS name to the PODs.

12. How to deploy a POD in specific node?
A: We can use nodeSelector to deploy the POD in the specific node.
Eg:
nodeSelector:
  kubernetes.io/hostname: i-04902c10928382c11

If you want to target group of nodes, then use NodeAffinity or Taints and Tolerations.

13.What is the purpose of Services in Kubernetes

A: A Kubernetes Service provides a stable network identity (IP and DNS) to access a set of dynamic, ephemeral pods. It enables internal and external communication with 
   pods regardless of their individual IPs, and supports load balancing across multiple pod replicas.

14. What are the different types of services in Kubernetes?
A: We have 5 types of services in Kubernetes:
1. ClusterIP
2. NodePort
3. LoadBalancer
4. Headless
5. ExternalName

15. What is the difference between Labels and Annotations in Kubernetes?
A: Labels are used to identify the objects in Kubernetes. For example, labels are used by Services to identify the pods. 

    Annotations are used to store the metadata of the objects. Add additional information to the objects. It is also used to enable the features in the objects.
    For example, aws nlb annotation is used to enable the NLB in the service.
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: nlb


16. What is the difference between ClusterIP and NodePort vs LoadBalancer?
ClusterIP: It is used to expose the service inside the cluster. It is not accessible from outside the cluster. This is mostly used along with the Ingress controller to expose outside.

NodePort: It is used to expose the service on the node's IP address. It is accessible from outside the cluster. It uses ports range 30000-32767. Its not used in production and very good option for testing.
Eg: http://NODE_IP:30000

LoadBalancer: It is used to expose the service on the cloud provider's load balancer. It is accessible from outside the cluster. It is used in production. But using seperate load balancer for each service is not recommended as it will be costly. But if the application has huge traffic then its recomanded to use LoadBalancer.


17. What is a Headless Service in Kubernetes?
A: A Headless Service is used when you don’t need load balancing or a stable ClusterIP. It directly returns the individual Pod IPs instead of a single virtual IP.
It is mainly used for stateful applications like databases where each Pod needs a unique identity


18. What is an Ingress Controller in Kubernetes?
A: Ingress controller is used to expose the services outside the cluster. It is used to route the traffic to the services based on the rules defined in the Ingress resource. The components of the Ingress controller are Ingress, Ingress Controller, Ingress Resource, Ingress Class, Ingress Rules and the service which ingress route.

Ingress controller use single LoadBalancer to route the traffic to the multiple services which will save cost.

19. What are the different types of Ingress Controllers?
A: Cloud Native Ingress Controllers:
   1. AWS Load Balancer Controller on EKS.
   2. Azure Application Gateway Ingress Controller on AKS.
   3. NgInx Ingress Controller.
   4. Traefik Ingress Controller.
All the Ingress Controller deployed as a POD in the cluster.

20.  What ingress controller can do?
A: SSL/TLS Termination and redirection.
Path-based routing.
Route Traffic based on the Hostname/Domain to backend services.


21. What is the difference between Ingress and Ingress Controller?
A: Ingress is a resource in Kubernetes which is used to define the rules to route the traffic to the services. Ingress Controller is a component in Kubernetes which is used to implement the rules defined in the Ingress resource which is a POD.

