23. What is Node Selector in Kubernetes?
A: Node Selector is used to deploy the PODs in the specific node. We can use the nodeSelector field in the POD spec to deploy the POD in the specific node.
nodeSelector:
  kubernetes.io/hostname: i-04902c10928382c11


24. What are the resources I can create in Kubernetes?
A: kubectl api-resources --namespaced=true - To get the namespaced resources
   kubectl api-resources --namespaced=false - To get the cluster level resources

25. What is difference between User and ServiceAccount?
A: User is the human being who access the cluster. It can be admin, developer, tester etc.

    A Service Account is an identity created inside Kubernetes for Pods or applications to authenticate to the API server.
    It is used by apps running inside Pods
    Eg: Prometheus need to connect to API server to get the metrics. So we need to create a ServiceAccount for Prometheus which can access the API server.
    ServiceAccount is created in the namespace and similar to IAM Role in AWS.


26. What is the difference between Role and ClusterRole?
A: Role is used to grant permissions within a namespace. 
    kubectl get pods, kubectl get deployments, kubectl get services - Will work
    kubectl get nodes - Will not work because it is cluster level permission.

  ClusterRole is used to grant permissions across the cluster.
  kubectl get nodes, kubectl get ns, kubectl cluster-info - Will work

27. What is the difference between RoleBinding and ClusterRoleBinding?
A: RoleBinding is used to bind the Role to the user or group within a namespace.
  ClusterRoleBinding is used to bind the ClusterRole to the user or group across the cluster.

28. What is the difference between ConfigMap and Secrets?
A: At the high level both Secrets and ConfigMaps are used to store the configuration data. 
The difference between the Secrets and ConfigMaps are:
- Secrets are used to store the sensitive data like passwords, tokens, ssh keys etc.
- ConfigMaps are used to store the non-sensitive data like application configuration, properties files etc. nginx configuration files, application.properties files etc.mysql.properties files etc.

29. What is the best way to assign the secrets to the POD? Is it using Environment Variables or Volume Mounts?
A: It is recommended to use Volume Mounts to assign the secrets to the POD. Because the secrets are mounted as files in the POD. It is not secure than 
   using Environment Variables because if you use Environment Variables, the secrets might be visible in the logs. If you use Volume Mounts, the secrets will be
   mounted as files in the POD.

Its also recomanded to use the secrets as Volume Mounts because if you use Environment Variables, you need to restart the POD to update the secrets. 
If you use Volume Mounts, you dont need to restart the POD to update the secrets.

30. How can I update the secrets in the POD without restarting the POD?
A: If you map the secret as Environment Variables, then you need to restart the POD to update the secrets. If you map the secret as Volume Mounts, then you dont 
   need to restart the POD to update the secrets. 

31.Does pods in different namespaces can communicate with each other?
Yes, Pods in different namespaces can communicate with each other as long as Network Policies do not block the traffic.
Kubernetes uses a flat cluster-wide network, so every Pod can reach every other Pod using its Pod IP or Service DNS, regardless of namespace.

32.How can restrict the communication between the PODs in the same & different 
namespaces?
A: We can restrict the communication between the PODs in the same & different namespaces using the Network Policies. Network Policies are used to control the traffic
   between the PODs in the cluster. It is like a firewall for the PODs in the cluster.

Network Policies works based on labels. We need to define the labels in the POD spec and define the labels in the Network Policy spec. We can define the rules to allow or deny the traffic between the PODs.

33.What is a JOB in Kubernetes?
A Job in Kubernetes is a controller that runs one-time tasks or batch processes until they successfully complete.
Unlike Deployments, Jobs do not run continuously — they ensure a Pod runs to completion and retry if it fails.
It’s used for tasks like data processing, backups, and database migrations.


34.What is a CronJob in Kubernetes?
A: CronJob is used to run the pods at the specific time or at the specific intervals. It is like a cron job in the linux. We can define the schedule in the cron format. CronJob is used to run the batch jobs, cron jobs etc. like backup, restore, database migration etc.

35. What is PV and PVC (or) what is the difference between Persistent Volume and Persistent Volume Claim?
A: Persistant Volume(PV) is an abstraction that represents a piece of storage in the cluster. This storage can be that NFS, iSCSI, or cloud-provider-specific storage system EBS, EFS.
   A PVC is a request for storage made by a Pod — like asking for a disk with a certain size and access mode.



36.What are the diff storage types supported by Kubernetes?
A: There are 4 types of storage supported by Kubernetes:
  1. EmptyDir ===> EmptyDir volume is created when the pod is created and it exists as long as a pod.This volume is used to share the  data between     multiple containers within a pod instead of the host machine or any Master/Worker Node.
  2. HostPath ===> Mounting hosts file system where the POD is running.
  3. PV & PVC  ===>

37.. What is the difference between ReadWriteOnce, ReadWriteMany, and ReadOnlyMany?
A: ReadWriteOnce: The volume can be mounted as read-write by a single node.
   Eg: EBS, Azure Disk, GCE Persistent Disk, etc.

   ReadWriteMany: The volume can be mounted as read-write by many nodes.
    Eg: NFS, CephFS, etc.

   ReadOnlyMany: The volume can be mounted as read-only by many nodes.
    Eg: NFS, CephFS, etc.

38. 9. What is Dynamic Volume Provisioning or Dynamic Provisioning in Kubernetes?
A: We can provsion PV in two ways:
   1. Static Provisioning: In this method, the PV is created manually by the cluster admin and the PVC is created by the developer. We dont want give storage control to the developer.

   2. Dynamic Provisioning: In this method, the developer creates the PVC and the PV is automatically created by the cluster based on the storage class. The challange here is the storage class should support the dynamic provisioning and admin dont have control over the storage. This means if the developer creates a PVC with huge storage, then the storage will be provisioned automatically and impact the cost.

39. I have a K8S Cluster on AWS and I want to enable Dynamic Provisioning for EBS Volumes. But I dont want my developers to create PVC with huge & costly storage. How do you achieve this?
A: We can achieve this by using the ResourceQuota. We can create a ResourceQuota for the namespace and limit the storage size. So, when the developer creates a PVC with huge storage, the PVC will be rejected by the cluster. 
apiVersion: v1
kind: ResourceQuota
metadata:
  name: storagequota
spec:
  hard:
    persistentvolumeclaims: "5"
    requests.storage: "5Gi" # Limit the storage size to 5Gi for all PVCs


The other way is to apply the LimitRange to the namespace. The LimitRange is used to set the min and max values for the PVCs.

From a AWS perspective, we can use service control policies to restrict the storage size and type.

40. What is a volumeBindingMode in StorageClass or what is the diff WaitForFirstConsumer and Immediate?
A: WaitForFirstConsumer: The PV will be bound to the PVC only when the PVC is used by the POD. This is useful when you want to create a PV but dont wantto bind it to the 
                         PVC until the POD is created. This is cost-effective as the storage is not provisioned until the POD is created.
  
Immediate: The PV will be bound to the PVC as soon as the PVC is created.This isuseful when you want to bind the PV to the PVC as soon as the PVCis created.

41. What are VolumeClaimTemplates?
A: VolumeClaimTemplates is used in the StatefulSets to create the PVCs dynamically. This is useful when you want to create multiple PVCs for the multiple replicas
   of the StatefulSets. 
Eg: MongoDB or MySQL StatefulSets where you want to create multiple PVCs for the multiple replicas.


42.  What are probes in Kubernetes (or) How do you check the health of a container in Kubernetes (or) How do you autoheal a container in Kubernetes?
A: Probes are used to check the health of a container in Kubernetes. 

43. What are the different types of probes in Kubernetes?
A: We have 3 types of probes in Kubernetes:
- Liveness probe: Indicates whether the container is running.
- Readiness probe: Indicates whether the container is ready to serve traffic.
- Startup probe: Indicates whether the application within the container is started.

44. Probes uses 3 different types of checks to determine the health of a container. What are they?
A: 
- httpGet: Sends an HTTP GET request to the specified path on the container.
- tcpSocket: Opens a socket to the specified port on the container.
- exec: Executes the specified command inside the container.

 45. What is difference between Liveness and Readiness probe?
A: Both Liveiness and Readiness probes are used to check the health of a container. The difference is:
- Liveness probe: Indicates whether the container is running and restarts the container if it fails.
- Readiness probe: Indicates whether the container is ready to serve traffic and stops sending traffic to the container if it fails. This is especially useful in rolling 
                   updates which needs buffer time to make sure the new version of the application is ready to serve traffic.

46.  Can we use Liveness and Readiness probes together?
A: Yes, we can use both Liveness and Readiness probes together. But we need to make sure a time difference between the two probes. The Readiness probe should be checked 
   first and then the Liveness probe. If you give same time for both probes, the Liveness probe will restart the container before the Readiness probe is checked.

47. What is the use of Startup probe?
A: Startup probe is used if its a legacy application which takes time to start. It is used to check if the application is started within the specified time. 
   The Liveiness and Readiness probes are started only after the Startup probe is successful.

48. What is initialDelaySeconds in probes?
A: initialDelaySeconds is the time to wait before starting the probe. It is used to give some time for the container to start before checking the health of the container.

49.  Are probes are at container level or pod level?
A: Probes are at container level. We can have different probes for different containers in a pod.

      containers:
      - name: nginx
        image: sreeharshav/testcontainer:v1
        ports:
        - containerPort: 80
        readinessProbe:
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            httpGet:
                path: /
                port: 80
        livenessProbe:
            initialDelaySeconds: 45
            periodSeconds: 5
            timeoutSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            httpGet:
                path: /
                port: 80
        startupProbe:
            failureThreshold: 6
            periodSeconds: 20
            httpGet:
                path: /
                port: 80

50. What are the diffrent types of Autoscaling in Kubernetes?
A: We have 2 types of Autoscaling in Kubernetes:
- Cluster Level to Add and Remove Worker Nodes automatically based on the load.
  - AWS -> AutoScaling Group but latest one is Karpenter.
  - Azure -> Virtual Machine Scale Sets.


- Pod Level to Add and Remove Pods automatically based on the load.
 - Horizontal Pod Autoscaler (HPA)
 - Vertical Pod Autoscaler (VPA)


51. What are the dependencies for Horizontal Pod Autoscaler (HPA)?
A: Horizontal Pod Autoscaler (HPA) depends on 2 things:
- Metrics Server: Metrics Server is used to get the CPU and Memory usage of the pods.
- Resource Request: Resource Request should be mentioned in the deployment file to get the CPU and Memory usage of the pods. Its recomanded to provide both requests and limits in the deployment file.

52.  What are the different metrics used in Horizontal Pod Autoscaler (HPA)?
A: We have diff metrics used in Horizontal Pod Autoscaler (HPA):
- CPU: CPU usage of the pods.
- Memory: Memory usage of the pods.
- Netowrk: Network usage of the pods.

53.  What will happen if the memory limit is reached in Horizontal Pod Autoscaler (HPA)?
A: If the memory limit is reached in Horizontal Pod Autoscaler (HPA), the pods will be restarted.

54. What will happen if the CPU limit is reached in Horizontal Pod Autoscaler (HPA)?
A: If the CPU limit is reached in Horizontal Pod Autoscaler (HPA), the CPU will be throttled which will slow down the application.

55. What is the difference between Horizontal Pod Autoscaler (HPA) and Vertical Pod Autoscaler (VPA)?
A: HPA add and remove pods based on the load where as VPA will evict the pods based on the load. Means VPA will change the resource request and limits of the pods based on the load and restart the pods which can cause downtime.

56. What will happen if the HPA reaches the maxReplicas?
A: If the HPA reaches the maxReplicas, the pods will be restarted.

57.  What is PDB or Pod Disruption Budget?
A: Pod Disruption Budget (PDB) is used to make sure the pods are not evicted more than the specified number of pods. It is used to make sure the application is available during the maintenance of the nodes.

58. hat are the 3rd party tools for cluster level autoscaling and opmization?
A: We have 3rd party tools for cluster level autoscaling and optimization:
- Karpenter: Karpenter is a cluster autoscaler for Kubernetes which is used to add and remove worker nodes automatically based on the load.
- cast.ai: castai is a cluster autoscaler for Kubernetes which is used to add and remove worker nodes automatically based on the load. It will do security checks and cost optimization for the cluster. Its not free.

