1. What is the difference between git fork and git clone?
A:  Git Clone creates a copy of the repository in your local machine and you can pull and push changes to the remote repository.

    Fork is useful when you want to contribute to the original repository.Fork creates a copy of the repository in your GitHub account. You can make changes and raise a pull request to the original repository.This is helpful when you are working on open-source projects.

2. Explain a scenario where you used git fork instead of git clone. Why was forking necessary?
A:  I used git fork when I contributed to a DevOps project in my org on GitHub. Since I didn’t have write access to the original repository, I forked it into my GitHub account, made changes, and then created a pull request from my fork to the upstream repo.

3. What is the difference between git fetch and git pull?
A:  Git Fetch will fetch the changes from the remote repository to your local repository but it will not merge the changes to your local repository. You need to merge the changes manually by running git merge origin/<branch>. 

    Git Pull = Git Fetch + Git Merge. Git Pull will fetch the changes from the remote repository and merge the changes to your local repository.

4. What is Git Merge?
A: Git Merge is used to merge the changes from one branch to another branch. You can merge the changes from the feature branch to the main branch. The main advantage of Git Merge is that it will not alter the commit history. But if you perform too many merges, it will create a lot of merge commits which will make the commit history complex.

5. Git Rebase?
A: Git Rebase is used to merge the changes from one branch to another branch. You can merge the changes from the feature branch to the main branch. The main disadvantage of Git Rebase is that it will alter the commit history. It will make the commit history linear. But if you perform too many rebases, it will create a lot of conflicts which will make the commit history complex.
The MAIN GOLDEN RULE of rabase is "NEVER REBASE A PUBLIC REPO USED BY MULTIPLE PEOPLE".

6. What is the difference between git rebase and git merge?
A: Both achieve the same goal of merging the changes from one branch to another branch. But Git Merge will not alter the commit history. But Git Rebase will alter the commit history. Git Rebase is used to make the commit history linear.

