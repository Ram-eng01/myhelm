9. Have you ever used Git tags? If yes, why?
A: Yes, I’ve used Git tags primarily to mark release versions of our applications. It helps track which commit corresponds to a production deployment, and makes it easier to roll back or audit changes when needed.
    git tag -a v1.0.3 -m "Release version 1.0.3 with critical bug fixes"
    git push origin v1.0.3


10. How do you combine multiple commits into a single commit in Git?

A: Git Squash is used to combine multiple commits into a single commit. It can be used with interactive rebase.

git rebase -i HEAD~4
