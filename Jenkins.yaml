1. What is Jenkins?
A: Jenkins is an open-source automation tool that helps in continuous integration and continuous delivery (CI/CD) of software projects. 
   It automates the building, testing, and deployment of applications, allowing developers to integrate their code changes frequently and
   detect issues early in the development process.

2. What is CI/ CD?
A: CI/CD is a DevOps practice that automates the software development lifecycle — from code integration to testing, and deployment — enabling faster, 
   safer, and more reliable releases.

   CI stands for continous integration which is a software developement practice where all the developers pushes their code in a centralized repository (git) 
   where Every change is automatically built and tested to catch issues early.
   CD – Continuous Delivery:
   Every successfully tested change is automatically packaged and made ready for deployment to staging or production — manual approval can be added.
   CD – Continuous Deployment (optional):
   Extends Continuous Delivery by automating the deployment to production without manual approval.
   Used when: Your team is confident in automated testing You want rapid, frequent releases (e.g., startups, microservices)

3. Difference between continuous delivery and deployment ?
A: Continuous Delivery: ✅ Code is always ready to deploy, but you choose when to release.
   Continuous Deployment: 🚀 Every change that passes tests is automatically pushed to production — no buttons to press.

   Example: Let’s say you fix a bug and push code:
   -With Continuous Delivery: Jenkins runs build & tests Artifact is deployed to staging ✅ A team member reviews & clicks “Deploy to Production” With Continuous Deployment: 
   Jenkins runs build & tests If all pass, 🚀 change goes directly to production.

   The key difference is that Continuous Delivery automates up to staging and waits for manual approval before deploying to production, while Continuous Deployment skips
   the manual step and pushes every change straight to production once it passes tests. I choose one over the other based on risk tolerance and business needs.”


4. What are Jenkins plugins?
A: Jenkins plugins are add-ons or extensions that enhance Jenkins' functionality. They allow Jenkins to integrate with other tools, add new features, and customize workflows
   based on your needs.
   
5. What is a Jenkinsfile, and how is it different from traditional job configurations?
A: A Jenkinsfile is a text file that contains the definition of a Jenkins pipeline. It allows you to define the entire CI/CD process as code, including stages, steps, and
  conditions.  It enables Pipeline as Code, making CI/CD workflows version-controlled, reviewable, and reproducible.

6. What is a Jenkins pipeline?
A: A Jenkins pipeline is a way to define and manage the entire CI/CD process in code. It allows you to define the stages, steps, and conditions for your build, test, 
   and deployment processes using a Jenkinsfile, which is written in Groovy. Pipelines provide better visibility, reusability, and version control for your CI/CD workflows.

8. How does jenkins master and agent communicate ?
A: Jenkins master and worker nodes communicate using protocols like SSH or JNLP. The master schedules and delegates jobs, while agents perform the job steps and return 
   results. This master-agent model allows Jenkins to scale builds efficiently and isolate workloads.

9. How can you secure Jenkins?
A: 1.Use Role-Based Access Control (RBAC)
   2.Keep Jenkins and Plugins Updated
   3.Secure Secrets and Credentials
      Use the Credentials Plugin to store API keys, tokens, passwords securely.
      Avoid hardcoding secrets in Jenkinsfile.
Use HTTPS: Configure Jenkins to run over HTTPS to encrypt data in transit.

10. What Does "Poll SCM" Mean In Jenkins?
A: In Jenkins, "Poll SCM" means that Jenkins will regularly check your Source Code Management (SCM) (like Git) for changes, at scheduled intervals, and if changes are found,
   it will trigger a build.

11. What is the difference between scripted and declarative pipelines in Jenkins?
A: Declarative Pipeline is a simplified and opinionated syntax for defining CI/CD workflows in Jenkins, compared to Scripted Pipelines. 
   It uses structured syntax and is easier to read, maintain, and validate.
   Key Features:
     Simplified Syntax: Easier to read and write compared to Scripted Pipelines.
     Built-in Error Handling: Provides default error handling mechanisms.
     Stage Visualization: Better visualization of stages in the Jenkins UI.
     Validation: Syntax is validated before execution, reducing runtime errors.

