Jenkins Scripted Pipeline is a powerful feature of Jenkins that allows you to define and automate your CI/CD (Continuous Integration and Continuous Delivery) workflows using
Groovy scripting language.
It provides:
  Full access to programming constructs (e.g., if, for, variables)
  The ability to create dynamic and conditional pipelines
  High flexibility and customization, suitable for complex pipeline logic

node {
    // Fetch the Maven installation path configured in Jenkins
    def mavenHome = tool name: "maven3.9.9"

    // Stage 1: Git Checkout
    stage('git checkout') {
        git branch: 'development',
            credentialsId: '8d341570-e046-4d2c-8060-33c3d5d493f7',
            url: 'https://github.com/gangavaramdevops/maven-web-app-project-kk-funda.git'
    }

    // Stage 2: Build the application
    stage('Build') {
        sh "${mavenHome}/bin/mvn clean package"
    }

    // Stage 3: SonarQube Code Quality Report
    stage('SQ Report') {
        sh "${mavenHome}/bin/mvn sonar:sonar"
    }

    // Stage 4: Upload to Nexus Repository
    stage('Deploy into Nexus') {
        sh "${mavenHome}/bin/mvn clean deploy"
    }

    // Stage 5: Deploy WAR to Tomcat using curl
    stage('Deploy to Tomcat') {
        echo "Deploying WAR file using curl..."

        sh """
            curl -u kkfunda:kkfunda \
            --upload-file /var/lib/jenkins/workspace/jio-scripted-way-pipeline-develoment/target/maven-web-application.war \
            "http://3.108.194.157:8080/manager/text/deploy?path=/maven-web-application&update=true"
        """
    }
} // node closing


 12. How can you parameterize Jenkins jobs to make them more flexible?
 A: Jenkins allows you to parameterize your jobs, which enables you to provide inputs or options when triggering the job. You can add parameters such as strings, Boolean
    values, choice parameters, or even file uploads. This makes the job more flexible and reusable as it can be configured differently each time it is triggered.

13.Explain the concept of Jenkins distributed builds and how they can be set up?
A: Jenkins distributed builds allow you to distribute the execution of jobs across multiple machines, known as Jenkins agents. This enables parallel execution of jobs and
   improves overall build capacity. To set up distributed builds, you need to configure Jenkins agents and connect them to the Jenkins master. Agents can be set up on 
   different physical or virtual machines and can be dedicated or shared among multiple projects.

14. How can you achieve high availability and scalability in a Jenkins setup?
A: To ensure Jenkins is highly available and scalable, especially in enterprise environments, we follow a combination of architectural best practices:
    1.Master-Agent Architecture (Horizontal Scaling)
    2.Load Distribution
      Distribute jobs across agents to avoid overloading the Jenkins controller.
    3. Backup and Restore
    4.Scalable Cloud Agents
      Jenkins spins up a pod/EC2 agent when a job is triggered and destroys it after use.
    5.Monitoring and Alerts
      Monitor Jenkins performance using tools like:
        Prometheus + Grafana
        Jenkins Metrics plugin
      Set alerts for high CPU, disk usage, or job queue spikes.

15. What is Jenkins Pipeline Shared Library, and how do you use it?
A: Jenkins Pipeline Shared Library allows you to define reusable code and functions that can be shared across multiple pipelines. It enables you to centralize common
  pipeline logic, promote code reuse, and maintain consistency across projects. To use a Shared Library, you define it in a separate repository, configure Jenkins to
 load the library, and then use the library functions in your Jenkins pipelines.


16. How can you implement Jenkins pipeline parallelization and what are the considerations?
A:  Jenkins pipeline parallelization allows you to run multiple stages or tasks at the same time instead of sequentially. This speeds up pipelines by 
    utilizing multiple agents or cores efficiently — especially for independent tasks like testing, building, or deploying in parallel.
pipeline {
    agent any

    stages {
        stage('Parallel Stages') {
            parallel {
                stage('Stage A') {
                    steps {
                        echo 'Running Stage A...'
                        sh 'sleep 5'
                    }
                }
                stage('Stage B') {
                    steps {
                        echo 'Running Stage B...'
                        sh 'sleep 5'
                    }
                }
            }
        }
    }
}

17. can parallelization work on same agent or need different agent?
A:Yes, parallel stages can run on the same agent, but: They will run serially if there's only one executor available. To run truly in parallel, you need either: An agent
  with multiple executors, or Multiple agents (worker nodes) in Jenkins.

18. What are Jenkins pipeline stages and how can you control their execution?
A: Stages in Jenkins pipelines represent distinct phases of the CI/CD process, such as build, test, deploy, and so on. Stages provide a structured way to
  visualize and control the pipeline flow. You can define stages using the stage directive in a Jenkinsfile and configure their execution order.

19. How can we use conditions in pipeline for example we have multiple branches and we want that build stage only run on dev branch?
A: You can use the when block with the branch condition inside a stage to control its execution

pipeline {
  agent any
  stages {
    stage("checkout"){
      steps {
        git branch: 'dev', url: 'https://github.com/your-repo.git'
      }
    }
    stage('Build') {
      when {
        branch 'dev' // 👈 Only run this stage on dev branch
       } 
       steps {
        echo 'Building the application for dev branch...'
         // Your build commands go here
      }
    }
    stage('Test') {
       steps {
       echo 'Running tests...'
      }
    }
  }
}

